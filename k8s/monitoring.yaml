---
# Optional: if you want Prometheus to probe the endpoints
# Requires prometheus-operator / blackbox-exporter
apiVersion: monitoring.coreos.com/v1
kind: Probe
metadata:
  name: argocd-status-checker
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-status-checker
spec:
  interval: 60s
  module: http_2xx
  prober:
    url: blackbox-exporter.monitoring.svc:9115
  targets:
    staticConfig:
      static:
        - argocd-status-checker.argocd.svc/auto-sync
        - argocd-status-checker.argocd.svc/apps

---
# Alert if either endpoint returns non-200 for more than 30 minutes
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: argocd-status-checker
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-status-checker
spec:
  groups:
    - name: argocd-status
      rules:
        - alert: ArgoCD_ServiceModeActive
          expr: probe_success{job="argocd-status-checker", instance=~".*/auto-sync"} == 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "One or more ArgoCD apps have auto-sync disabled"
            description: >-
              The /auto-sync endpoint has been returning non-200 for over 30 minutes.
              Check: curl argocd-status-checker.argocd.svc/auto-sync
        - alert: ArgoCD_AppsUnhealthy
          expr: probe_success{job="argocd-status-checker", instance=~".*/apps"} == 0
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "One or more ArgoCD apps are not Healthy or Synced"
            description: >-
              The /apps endpoint has been returning non-200 for over 30 minutes.
              Check: curl argocd-status-checker.argocd.svc/apps
